<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="320" viewBox="0 0 1600 320">
  <defs>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #1f2937; }
      .box { fill: #f8fafc; stroke: #2563eb; stroke-width: 2; rx: 14; ry: 14; }
      .train { fill: #ecfeff; stroke: #0f766e; stroke-width: 2; rx: 14; ry: 14; }
      .holdout { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 14; ry: 14; }
      .text { font: 15px Arial, sans-serif; fill: #111827; }
      .small { font: 13px Arial, sans-serif; fill: #374151; }
      .arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .dash { stroke: #c2410c; stroke-width: 3; stroke-dasharray: 8 6; fill: none; marker-end: url(#arrowheadOrange); }
      .split { stroke: #0f766e; stroke-width: 3; fill: none; marker-end: url(#arrowheadTeal); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155" />
    </marker>
    <marker id="arrowheadTeal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0f766e" />
    </marker>
    <marker id="arrowheadOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c2410c" />
    </marker>
  </defs>

  <text x="800" y="34" text-anchor="middle" class="title">Corrected Experimental Pipeline After Leakage Fix</text>

  <rect x="40" y="100" width="170" height="72" class="box"/>
  <text x="125" y="128" text-anchor="middle" class="text">Raw URL Data</text>
  <text x="125" y="150" text-anchor="middle" class="small">phishing + legitimate</text>

  <rect x="240" y="100" width="170" height="72" class="box"/>
  <text x="325" y="128" text-anchor="middle" class="text">Cleaning</text>
  <text x="325" y="150" text-anchor="middle" class="small">normalize, dedupe</text>

  <rect x="440" y="100" width="170" height="72" class="box"/>
  <text x="525" y="128" text-anchor="middle" class="text">Feature Build</text>
  <text x="525" y="150" text-anchor="middle" class="small">URL + domain + content</text>

  <rect x="640" y="100" width="170" height="72" class="box"/>
  <text x="725" y="128" text-anchor="middle" class="text">Train/Holdout Split</text>
  <text x="725" y="150" text-anchor="middle" class="small">80/20, seed=42</text>

  <rect x="840" y="55" width="190" height="72" class="train"/>
  <text x="935" y="83" text-anchor="middle" class="text">Training Partition</text>
  <text x="935" y="105" text-anchor="middle" class="small">feature ranking + fit</text>

  <rect x="840" y="175" width="190" height="72" class="holdout"/>
  <text x="935" y="203" text-anchor="middle" class="text">Holdout Partition</text>
  <text x="935" y="225" text-anchor="middle" class="small">final unbiased metrics</text>

  <rect x="1060" y="55" width="180" height="72" class="train"/>
  <text x="1150" y="83" text-anchor="middle" class="text">Train-only Feature Selection</text>
  <text x="1150" y="105" text-anchor="middle" class="small">rank features on train only</text>

  <rect x="1260" y="55" width="180" height="72" class="train"/>
  <text x="1350" y="83" text-anchor="middle" class="text">Model Training</text>
  <text x="1350" y="105" text-anchor="middle" class="small">CV on train partition</text>

  <rect x="1260" y="175" width="180" height="72" class="holdout"/>
  <text x="1350" y="203" text-anchor="middle" class="text">Final Evaluation</text>
  <text x="1350" y="225" text-anchor="middle" class="small">accuracy, recall, F1, ROC-AUC</text>

  <line x1="210" y1="136" x2="240" y2="136" class="arrow"/>
  <line x1="410" y1="136" x2="440" y2="136" class="arrow"/>
  <line x1="610" y1="136" x2="640" y2="136" class="arrow"/>
  <line x1="810" y1="136" x2="840" y2="91" class="split"/>
  <line x1="810" y1="136" x2="840" y2="211" class="split"/>
  <line x1="1030" y1="91" x2="1060" y2="91" class="arrow"/>
  <line x1="1240" y1="91" x2="1260" y2="91" class="arrow"/>
  <line x1="1150" y1="127" x2="1150" y2="175" class="dash"/>
  <line x1="1440" y1="91" x2="1470" y2="91" class="arrow"/>
  <line x1="1470" y1="91" x2="1470" y2="175" class="dash"/>
</svg>