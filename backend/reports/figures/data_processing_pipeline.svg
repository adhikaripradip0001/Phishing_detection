<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="260" viewBox="0 0 1500 260">
  <defs>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #1f2937; }
      .box { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 14; ry: 14; }
      .text { font: 15px Arial, sans-serif; fill: #111827; }
      .small { font: 13px Arial, sans-serif; fill: #374151; }
      .arrow { stroke: #c2410c; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c2410c" />
    </marker>
  </defs>
  <text x="750" y="36" text-anchor="middle" class="title">Data Processing Pipeline</text>

  <rect x="20" y="90" width="140" height="70" class="box"/>
  <text x="90" y="120" text-anchor="middle" class="text">Raw Records</text>
  <text x="90" y="142" text-anchor="middle" class="small">CSV input</text>

  <rect x="190" y="90" width="140" height="70" class="box"/>
  <text x="260" y="120" text-anchor="middle" class="text">Schema</text>
  <text x="260" y="142" text-anchor="middle" class="small">Harmonization</text>

  <rect x="360" y="90" width="140" height="70" class="box"/>
  <text x="430" y="120" text-anchor="middle" class="text">URL</text>
  <text x="430" y="142" text-anchor="middle" class="small">Canonicalization</text>

  <rect x="530" y="90" width="140" height="70" class="box"/>
  <text x="600" y="120" text-anchor="middle" class="text">Missing</text>
  <text x="600" y="142" text-anchor="middle" class="small">Value Handling</text>

  <rect x="700" y="90" width="140" height="70" class="box"/>
  <text x="770" y="120" text-anchor="middle" class="text">Duplicate</text>
  <text x="770" y="142" text-anchor="middle" class="small">Filtering</text>

  <rect x="870" y="90" width="140" height="70" class="box"/>
  <text x="940" y="120" text-anchor="middle" class="text">Label</text>
  <text x="940" y="142" text-anchor="middle" class="small">Mapping</text>

  <rect x="1040" y="90" width="140" height="70" class="box"/>
  <text x="1110" y="120" text-anchor="middle" class="text">Feature</text>
  <text x="1110" y="142" text-anchor="middle" class="small">Engineering</text>

  <rect x="1210" y="90" width="140" height="70" class="box"/>
  <text x="1280" y="120" text-anchor="middle" class="text">Model-Ready</text>
  <text x="1280" y="142" text-anchor="middle" class="small">Matrix</text>

  <line x1="160" y1="125" x2="190" y2="125" class="arrow"/>
  <line x1="330" y1="125" x2="360" y2="125" class="arrow"/>
  <line x1="500" y1="125" x2="530" y2="125" class="arrow"/>
  <line x1="670" y1="125" x2="700" y2="125" class="arrow"/>
  <line x1="840" y1="125" x2="870" y2="125" class="arrow"/>
  <line x1="1010" y1="125" x2="1040" y2="125" class="arrow"/>
  <line x1="1180" y1="125" x2="1210" y2="125" class="arrow"/>
</svg>