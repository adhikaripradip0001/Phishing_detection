<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <defs>
    <style>
      .title { font: 700 26px Arial, sans-serif; fill: #1f2937; }
      .label { font: 16px Arial, sans-serif; fill: #111827; }
      .axis { stroke: #374151; stroke-width: 2; }
      .grid { stroke: #e5e7eb; stroke-width: 1; }
      .bar1 { fill: #ef4444; }
      .bar2 { fill: #10b981; }
      .value { font: 700 16px Arial, sans-serif; fill: #111827; }
      .legend { font: 15px Arial, sans-serif; fill: #374151; }
    </style>
  </defs>
  <text x="450" y="40" text-anchor="middle" class="title">Dataset Distribution</text>

  <line x1="100" y1="430" x2="820" y2="430" class="axis"/>
  <line x1="100" y1="80" x2="100" y2="430" class="axis"/>

  <line x1="100" y1="360" x2="820" y2="360" class="grid"/>
  <line x1="100" y1="290" x2="820" y2="290" class="grid"/>
  <line x1="100" y1="220" x2="820" y2="220" class="grid"/>
  <line x1="100" y1="150" x2="820" y2="150" class="grid"/>

  <rect x="220" y="140" width="180" height="290" class="bar1"/>
  <rect x="520" y="138" width="180" height="292" class="bar2"/>

  <text x="310" y="130" text-anchor="middle" class="value">36,500</text>
  <text x="610" y="128" text-anchor="middle" class="value">36,660</text>

  <text x="310" y="460" text-anchor="middle" class="label">Phishing</text>
  <text x="610" y="460" text-anchor="middle" class="label">Legitimate</text>

  <rect x="260" y="480" width="16" height="16" class="bar1"/>
  <text x="285" y="493" class="legend">Phishing URLs</text>
  <rect x="430" y="480" width="16" height="16" class="bar2"/>
  <text x="455" y="493" class="legend">Legitimate URLs</text>
</svg>