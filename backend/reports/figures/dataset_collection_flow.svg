<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="360" viewBox="0 0 1400 360">
  <defs>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #1f2937; }
      .box { fill: #f8fafc; stroke: #0f766e; stroke-width: 2; rx: 14; ry: 14; }
      .box2 { fill: #ecfeff; stroke: #0f766e; stroke-width: 2; rx: 14; ry: 14; }
      .text { font: 16px Arial, sans-serif; fill: #111827; }
      .small { font: 14px Arial, sans-serif; fill: #374151; }
      .arrow { stroke: #0f766e; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0f766e" />
    </marker>
  </defs>
  <text x="700" y="36" text-anchor="middle" class="title">Dataset Collection Flow</text>

  <rect x="40" y="70" width="270" height="70" class="box"/>
  <text x="175" y="98" text-anchor="middle" class="text">Phishing Sources</text>
  <text x="175" y="120" text-anchor="middle" class="small">OpenPhish, PhishTank, CSVs</text>

  <rect x="40" y="200" width="270" height="70" class="box"/>
  <text x="175" y="228" text-anchor="middle" class="text">Legitimate Sources</text>
  <text x="175" y="250" text-anchor="middle" class="small">Tranco and trusted URL lists</text>

  <rect x="390" y="120" width="270" height="70" class="box2"/>
  <text x="525" y="148" text-anchor="middle" class="text">Schema Harmonization</text>
  <text x="525" y="170" text-anchor="middle" class="small">Map URL and label columns</text>

  <rect x="730" y="120" width="270" height="70" class="box2"/>
  <text x="865" y="148" text-anchor="middle" class="text">Label Normalization</text>
  <text x="865" y="170" text-anchor="middle" class="small">phishing = 1, legitimate = 0</text>

  <rect x="1070" y="120" width="270" height="70" class="box2"/>
  <text x="1205" y="148" text-anchor="middle" class="text">Data Cleaning</text>
  <text x="1205" y="170" text-anchor="middle" class="small">Remove duplicates and nulls</text>

  <rect x="1070" y="230" width="270" height="70" class="box2"/>
  <text x="1205" y="258" text-anchor="middle" class="text">Combined Raw Dataset</text>
  <text x="1205" y="280" text-anchor="middle" class="small">Cleaned and merged records</text>

  <line x1="310" y1="105" x2="390" y2="155" class="arrow"/>
  <line x1="310" y1="235" x2="390" y2="155" class="arrow"/>
  <line x1="660" y1="155" x2="730" y2="155" class="arrow"/>
  <line x1="1000" y1="155" x2="1070" y2="155" class="arrow"/>
  <line x1="1205" y1="190" x2="1205" y2="230" class="arrow"/>
</svg>