  <rect x="790" y="136" width="14" height="14" fill="#f97316"/>
  <text x="812" y="148" fill="#d1d5db" style="font:14px Arial, sans-serif;">Holdout Accuracy</text>
  <rect x="790" y="160" width="14" height="14" fill="#1fb788"/>
  <text x="812" y="172" fill="#d1d5db" style="font:14px Arial, sans-serif;">Holdout F1</text>
</svg>